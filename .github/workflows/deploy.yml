name: Node.js CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20.x'

    - name: Install Dependencies
      run: npm install

    - name: Start Bot
      env:
        SESSION_ID: ${{ secrets.SESSION_ID }}
        BOT_NAME: ${{ secrets.BOT_NAME }}
        OWNER_NUMBER: "254715182153"
      run: node index.ts

